<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejamento de Refeições — Kit Organização do Lar</title>
  <style>
    /* ============================================
       RESET & BASE
    ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f0ebe3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ============================================
       PÁGINA A4 PAISAGEM
    ============================================ */
    .pagina {
      width: 297mm;
      min-height: 210mm;
      background: #FDFAF6;
      padding: 12mm 14mm 10mm 14mm;
      box-shadow: 0 4px 30px rgba(0,0,0,0.12);
      position: relative;
    }

    /* ============================================
       CABEÇALHO
    ============================================ */
    .cabecalho {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 8mm;
      padding-bottom: 4mm;
      border-bottom: 1.5px solid #C4A882;
    }

    .titulo-bloco h1 {
      font-size: 22pt;
      color: #3D2B1F;
      font-weight: normal;
      letter-spacing: 0.5px;
    }

    .titulo-bloco p {
      font-size: 9pt;
      color: #8B6E52;
      margin-top: 2px;
      font-style: italic;
    }

    .semana-bloco {
      text-align: right;
    }

    .semana-bloco label {
      font-size: 9pt;
      color: #8B6E52;
      display: block;
      margin-bottom: 2px;
    }

    .semana-bloco .linha-semana {
      display: inline-block;
      width: 60mm;
      border-bottom: 1px solid #C4A882;
      height: 14px;
    }

    /* ============================================
       GRADE PRINCIPAL
    ============================================ */
    .grade-container {
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Cabeçalho dos dias */
    .linha-dias th {
      padding: 5px 4px;
      text-align: center;
      font-size: 9pt;
      font-weight: bold;
      color: #3D2B1F;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: transparent;
    }

    .linha-dias th:first-child {
      width: 22mm; /* coluna de label */
    }

    /* Células de refeição */
    .label-refeicao {
      padding: 6px 8px;
      vertical-align: middle;
      border-radius: 4px 0 0 4px;
    }

    .label-refeicao span {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 8pt;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      text-align: center;
    }

    /* Cores por refeição */
    .cafe .label-refeicao {
      background: #F5E6C8;
    }
    .cafe .label-refeicao span {
      color: #8B5E1A;
    }

    .almoco .label-refeicao {
      background: #D4E8D0;
    }
    .almoco .label-refeicao span {
      color: #2E6B3E;
    }

    .jantar .label-refeicao {
      background: #E8D0D8;
    }
    .jantar .label-refeicao span {
      color: #7A2E45;
    }

    /* Células de conteúdo */
    .celula {
      border: 1px solid #E0D5C5;
      vertical-align: top;
      height: 38mm;
      padding: 6px 8px;
      position: relative;
    }

    /* Linhas internas para escrita */
    .celula::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      height: 1px;
      background: #E8DDD0;
      box-shadow: 0 -10px 0 0 #E8DDD0, 0 -20px 0 0 #E8DDD0;
    }

    /* Separador entre refeições */
    .cafe td, .cafe th {
      border-bottom: 1px solid #C4A882;
    }

    .almoco td {
      border-bottom: 1px solid #C4A882;
    }

    /* Fundo alternado sutil por refeição */
    .cafe .celula {
      background: #FFFDF7;
    }

    .almoco .celula {
      background: #F7FBF7;
    }

    .jantar .celula {
      background: #FFF8FA;
    }

    /* ============================================
       RODAPÉ
    ============================================ */
    .rodape {
      margin-top: 6mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4mm;
      border-top: 1px solid #E0D5C5;
    }

    .frase-motivacional {
      font-size: 8pt;
      color: #8B6E52;
      font-style: italic;
    }

    .legenda {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 8pt;
      color: #5C4033;
    }

    .legenda-cor {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .cor-cafe { background: #F5E6C8; border: 1px solid #C4A882; }
    .cor-almoco { background: #D4E8D0; border: 1px solid #8FBC8F; }
    .cor-jantar { background: #E8D0D8; border: 1px solid #C08090; }

    /* ============================================
       IMPRESSÃO
    ============================================ */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }

      .pagina {
        width: 297mm;
        height: 210mm;
        padding: 10mm 14mm 8mm 14mm;
        box-shadow: none;
        page-break-after: always;
      }

      @page {
        size: A4 landscape;
        margin: 0;
      }
    }
  </style>
</head>
<body>

<div class="pagina">

  <!-- CABEÇALHO -->
  <div class="cabecalho">
    <div class="titulo-bloco">
      <h1>Planejamento de Refeições</h1>
      <p>Kit Organização do Lar — Bônus 1</p>
    </div>
    <div class="semana-bloco">
      <label>Semana de</label>
      <span class="linha-semana"></span>
    </div>
  </div>

  <!-- GRADE -->
  <div class="grade-container">
    <table>
      <thead>
        <tr class="linha-dias">
          <th></th>
          <th>Segunda</th>
          <th>Terça</th>
          <th>Quarta</th>
          <th>Quinta</th>
          <th>Sexta</th>
          <th>Sábado</th>
          <th>Domingo</th>
        </tr>
      </thead>
      <tbody>

        <!-- CAFÉ DA MANHÃ -->
        <tr class="cafe">
          <td class="label-refeicao">
            <span>Café da Manhã</span>
          </td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
        </tr>

        <!-- ALMOÇO -->
        <tr class="almoco">
          <td class="label-refeicao">
            <span>Almoço</span>
          </td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
        </tr>

        <!-- JANTAR -->
        <tr class="jantar">
          <td class="label-refeicao">
            <span>Jantar</span>
          </td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
          <td class="celula"></td>
        </tr>

      </tbody>
    </table>
  </div>

  <!-- RODAPÉ -->
  <div class="rodape">
    <p class="frase-motivacional">
      "Uma família bem alimentada começa com um bom planejamento."
    </p>
    <div class="legenda">
      <div class="legenda-item">
        <div class="legenda-cor cor-cafe"></div>
        Café da Manhã
      </div>
      <div class="legenda-item">
        <div class="legenda-cor cor-almoco"></div>
        Almoço
      </div>
      <div class="legenda-item">
        <div class="legenda-cor cor-jantar"></div>
        Jantar
      </div>
    </div>
  </div>

</div>

</body>
</html>
